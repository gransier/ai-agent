server:
  port: 8080

agent:
  base-url: http://192.168.2.207/v1/
  connect-timeout: 30
  read-timeout: 300
  write-timeout: 30
  call-timeout: 600
  retry-on-connection-failure-timeout: true
  max-call-depth: 10
  max-tools-per-turn: 5
  tool-execution-timeout: 30000

mcp:
  enabled: true
  connection-timeout: 30
  request-timeout: 60
  servers:
    - name: filesystem
      type: stdio
      command: npx
      args:
        - "-y"
        - "@modelcontextprotocol/server-filesystem"
        - "/tmp"
      enabled: false
    - name: memory
      type: stdio
      command: npx
      args:
        - "-y"
        - "@modelcontextprotocol/server-memory"
      enabled: false

oss:
  type: minio
  endpoint: http://192.168.2.83:9000/
  access-key: admin
  secret-key: 12qw!@QW
  bucket-name: workspace

conversation:
  enabled: true
  max-context-tokens: 128000
  max-messages: 100
  compression-threshold: 100000
  compression-ratio: 0.3
  auto-title: true
  persist-enabled: false
  session-timeout-minutes: 60
  max-sessions-per-user: 50
  storage-type: memory